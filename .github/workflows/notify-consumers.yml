name: Notify consuming repos

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "tsup.config.ts"

jobs:
  notify-consumers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [SupraAgent/SupraTeam, SupraAgent/SupraLoop]
    steps:
      - name: Get commit info
        id: info
        run: |
          echo "short_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "branch=chore/update-automation-builder-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          REPO_NAME=$(echo "${{ matrix.repo }}" | cut -d'/' -f2)
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT

      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.BUILDER_REPO_PAT }}
          path: consumer

      - name: Check if dependency exists
        id: check
        working-directory: consumer
        run: |
          if grep -q "@supra/automation-builder" package.json; then
            echo "has_dep=true" >> $GITHUB_OUTPUT
          else
            echo "has_dep=false" >> $GITHUB_OUTPUT
          fi

      - name: Create update branch and PR
        if: steps.check.outputs.has_dep == 'true'
        working-directory: consumer
        env:
          GH_TOKEN: ${{ secrets.BUILDER_REPO_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${{ steps.info.outputs.branch }}"
          git checkout -b "$BRANCH"

          # Touch package.json to trigger reinstall on consumer side
          # The file: dependency resolves at install time, so consumers
          # just need to know an update is available
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          node -e "
            const pkg = require('./package.json');
            if (!pkg.automationBuilder) pkg.automationBuilder = {};
            pkg.automationBuilder.lastSync = '$TIMESTAMP';
            pkg.automationBuilder.syncedFrom = '${GITHUB_SHA::8}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          git add package.json
          git commit -m "chore: automation builder updated (${{ steps.info.outputs.short_sha }})

          Upstream commit: ${{ github.event.head_commit.message }}
          Source: SupraAgent/Supra-Automation-Builder@${GITHUB_SHA}

          Run \`npm install\` to pull the latest builder changes.

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          git push origin "$BRANCH"

          gh pr create \
            --title "chore: update @supra/automation-builder (${{ steps.info.outputs.short_sha }})" \
            --body "$(cat <<'BODY'
          ## Automation Builder Updated

          New changes were pushed to [Supra-Automation-Builder](https://github.com/SupraAgent/Supra-Automation-Builder).

          **Upstream commit:** \`${{ steps.info.outputs.short_sha }}\`
          **Message:** ${{ github.event.head_commit.message }}

          ### To apply
          Merge this PR, then run \`npm install\` to pull the latest builder package.

          ---
          *Auto-generated by [notify-consumers](https://github.com/SupraAgent/Supra-Automation-Builder/actions) workflow*
          BODY
          )" \
            --base main \
            --head "$BRANCH"
