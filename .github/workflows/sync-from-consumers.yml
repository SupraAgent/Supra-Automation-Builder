name: Sync node definitions from consumer repos

on:
  repository_dispatch:
    types: [suprateam-update, supraloop-update]
  workflow_dispatch:
    inputs:
      consumer:
        description: "Which consumer repo to sync from"
        required: true
        type: choice
        options:
          - suprateam
          - supraloop
          - all

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: suprateam
            repo: SupraAgent/SupraTeam
            source_files: "lib/workflow-registry.ts,lib/workflow-actions.ts"
          - name: supraloop
            repo: SupraAgent/SupraLoop
            source_files: "src/lib/flow-templates.ts,src/components/visual-builder/node-palette.tsx"
      fail-fast: false
    # Skip matrix entries that don't match the dispatch event
    # For repository_dispatch: only run the matching consumer
    # For workflow_dispatch: run the selected consumer or all
    steps:
      - name: Should this consumer run?
        id: gate
        run: |
          EVENT="${{ github.event_name }}"
          CONSUMER="${{ matrix.name }}"

          if [ "$EVENT" = "repository_dispatch" ]; then
            # e.g. suprateam-update → suprateam
            DISPATCH_CONSUMER="${{ github.event.action }}"
            DISPATCH_CONSUMER="${DISPATCH_CONSUMER%-update}"
            if [ "$CONSUMER" = "$DISPATCH_CONSUMER" ]; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.consumer }}"
            if [ "$INPUT" = "all" ] || [ "$INPUT" = "$CONSUMER" ]; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout automation builder
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Checkout consumer repo
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.BUILDER_REPO_PAT }}
          path: consumer

      - name: Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run sync script
        if: steps.gate.outputs.run == 'true'
        run: node scripts/sync-registry.mjs ${{ matrix.name }} ./consumer

      - name: Check for changes
        if: steps.gate.outputs.run == 'true'
        id: diff
        run: |
          if git diff --quiet src/registries/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with updated registry
        if: steps.gate.outputs.run == 'true' && steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.BUILDER_REPO_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SHORT_SHA="${GITHUB_SHA::8}"
          BRANCH="chore/sync-${{ matrix.name }}-nodes-${SHORT_SHA}"
          git checkout -b "$BRANCH"

          git add src/registries/
          git commit -m "chore: sync node definitions from ${{ matrix.name }}

          New or updated triggers/actions detected in ${{ matrix.repo }}.
          Run \`npm run build\` to verify the updated registry.

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          git push origin "$BRANCH"

          gh pr create \
            --title "chore: sync node definitions from ${{ matrix.name }}" \
            --body "$(cat <<'BODY'
          ## Node Definitions Updated

          New or updated triggers, actions, or templates were detected in [${{ matrix.repo }}](https://github.com/${{ matrix.repo }}).

          ### Changes
          $(git diff HEAD~1 --stat src/registries/)

          ### To verify
          1. Merge this PR
          2. Run `npm run build` to ensure the registry compiles

          ---
          *Auto-generated by [sync-from-consumers](https://github.com/SupraAgent/Supra-Automation-Builder/actions) workflow*
          BODY
          )" \
            --base main \
            --head "$BRANCH"
