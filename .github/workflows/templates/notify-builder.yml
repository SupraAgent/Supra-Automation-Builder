# ─────────────────────────────────────────────────────────────────
# Template: Notify Supra-Automation-Builder of new node definitions
#
# Add this workflow to SupraTeam or SupraLoop's .github/workflows/
# to trigger a registry sync whenever workflow functions, templates,
# or integrations change.
#
# Prerequisites:
#   - A repository secret BUILDER_REPO_PAT with repo scope,
#     authorized to dispatch workflows on SupraAgent/Supra-Automation-Builder.
# ─────────────────────────────────────────────────────────────────

name: Notify automation builder

on:
  push:
    branches: [main]
    paths:
      # ── SupraTeam paths (remove if not applicable) ──
      - "lib/workflow-registry.ts"
      - "lib/workflow-actions.ts"
      - "lib/automation-registry.ts"
      - "lib/telegram-*.ts"
      - "lib/slack.ts"
      # ── SupraLoop paths (remove if not applicable) ──
      - "src/lib/flow-templates.ts"
      - "src/components/visual-builder/nodes/**"
      - "src/components/visual-builder/node-palette.tsx"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch sync to automation builder
        env:
          GH_TOKEN: ${{ secrets.BUILDER_REPO_PAT }}
        run: |
          # Determine consumer name from repo
          REPO_NAME="${{ github.repository }}"
          case "$REPO_NAME" in
            */SupraTeam)  CONSUMER="suprateam" ;;
            */SupraLoop)  CONSUMER="supraloop" ;;
            *)            CONSUMER="unknown" ;;
          esac

          gh api \
            --method POST \
            repos/SupraAgent/Supra-Automation-Builder/dispatches \
            -f "event_type=${CONSUMER}-update" \
            -f "client_payload[repo]=${REPO_NAME}" \
            -f "client_payload[sha]=${GITHUB_SHA}" \
            -f "client_payload[message]=${{ github.event.head_commit.message }}"

          echo "Dispatched ${CONSUMER}-update to Supra-Automation-Builder"
