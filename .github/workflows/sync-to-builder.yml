name: Sync builder changes upstream

on:
  push:
    branches: [main]
    paths:
      - "src/components/visual-builder/**"
      - "src/lib/flow-templates.ts"
      - "src/lib/workflow-engine.ts"
      - "src/lib/use-undo-redo.ts"

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SupraLoop
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout Supra-Automation-Builder
        uses: actions/checkout@v4
        with:
          repository: SupraAgent/Supra-Automation-Builder
          token: ${{ secrets.BUILDER_REPO_PAT }}
          path: builder

      - name: Get commit info
        id: info
        run: |
          echo "short_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "branch=sync/supraloop-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Create sync PR
        working-directory: builder
        env:
          GH_TOKEN: ${{ secrets.BUILDER_REPO_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${{ steps.info.outputs.branch }}"
          git checkout -b "$BRANCH"

          # Copy changed files into a sync directory for review
          mkdir -p sync/supraloop
          cd ../source

          # Copy builder-related files that changed
          for f in src/lib/flow-templates.ts src/lib/workflow-engine.ts src/lib/use-undo-redo.ts; do
            if [ -f "$f" ]; then
              cp "$f" ../builder/sync/supraloop/
            fi
          done

          if [ -d "src/components/visual-builder" ]; then
            cp -r src/components/visual-builder/ ../builder/sync/supraloop/visual-builder/
          fi

          cd ../builder

          # Check if there are actual changes
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to sync"
            exit 0
          fi

          git add sync/
          git commit -m "sync: builder changes from SupraLoop (${{ steps.info.outputs.short_sha }})

          Upstream commit: ${{ github.event.head_commit.message }}
          Source: SupraAgent/SupraLoop@${GITHUB_SHA}

          Files in sync/supraloop/ are for review — extract relevant
          generic improvements into src/ before merging.

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          git push origin "$BRANCH"

          gh pr create \
            --title "sync: SupraLoop builder changes (${{ steps.info.outputs.short_sha }})" \
            --body "$(cat <<'BODY'
          ## Builder Changes from SupraLoop

          Visual builder files were updated in [SupraLoop](https://github.com/SupraAgent/SupraLoop).

          **Commit:** \`${{ steps.info.outputs.short_sha }}\`
          **Message:** ${{ github.event.head_commit.message }}

          ### What to do
          Changed files are in \`sync/supraloop/\` for review. Extract any generic
          improvements into \`src/\` and delete the sync directory before merging.

          **Don't merge the sync/ folder directly** — it contains SupraLoop-specific code
          (13 custom node types, personas, etc.). Pick out the generic parts that should
          go into the shared package.

          ---
          *Auto-generated by [sync-to-builder](https://github.com/SupraAgent/SupraLoop/actions) workflow*
          BODY
          )" \
            --base main \
            --head "$BRANCH"
